name: Terraform (foundation)

# Foundation layer — persistent AWS state (Secrets Manager entries, etc.)
# that must survive EKS teardowns. Separate state, separate cadence,
# separate workflow from the workload layer in terraform.yml.
#
# Intentional differences from terraform.yml:
#   - runs on ubuntu-latest (GitHub-hosted), NOT arc-runner-set-terraform.
#     Foundation must be appliable BEFORE the cluster exists, so it can't
#     depend on an in-cluster runner. OIDC works identically on hosted
#     runners.
#   - no `destroy` action. Every resource carries `prevent_destroy = true`
#     and destroying the foundation is a deliberate out-of-band act.
#   - path-filtered: only runs when foundation files change.

on:
  push:
    branches: ['**']
    paths:
      - 'envs/prod/eu-west-1/foundation/**'
      - '.github/workflows/terraform-foundation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'envs/prod/eu-west-1/foundation/**'
      - '.github/workflows/terraform-foundation.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: envs/prod/eu-west-1/foundation
  AWS_REGION: eu-west-1

# Serialize runs against the foundation state to avoid lock contention.
concurrency:
  group: terraform-foundation-prod-eu-west-1
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-foundation
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

  apply:
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-foundation
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
